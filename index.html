<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển hướng...</title>

    <!-- Open Graph / Facebook Meta Tags (Dành cho việc hiển thị ảnh xem trước trên Facebook) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sp-gamma-one.vercel.app/">
    <!-- Điền link trang web Vercel của bạn ở đây -->
    <meta property="og:title" content="🔥 Deal Hời Shopee - Mua Ngay Kẻo Lỡ! 🔥"> <!-- Tiêu đề bài đăng Facebook -->
    <meta property="og:description"
        content="Sản phẩm đang được giảm giá cực sốc. Click vào để xem chi tiết và nhận voucher ưu đãi ngay hôm nay!">
    <!-- Mô tả bài đăng Facebook -->
    <meta property="og:image"
        content="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=1200&auto=format&fit=crop">
    <!-- Link ảnh thumbnail hiển thị trên Facebook -->

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="🔥 Deal Hời Shopee - Mua Ngay Kẻo Lỡ! 🔥">
    <meta name="twitter:description"
        content="Sản phẩm đang được giảm giá cực sốc. Click vào để xem chi tiết và nhận voucher ưu đãi ngay hôm nay!">
    <meta name="twitter:image"
        content="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=1200&auto=format&fit=crop">

    <!-- Chuyển hướng bằng Javascript và chặn bot crawler -->
    <script>
        const TARGET_URL = "https://s.shopee.vn/20tYxdLJp1"; // Thay bằng link Shopee thực tế của bạn tại đây

        // Kiểm tra xem user-agent có phải là các bot thu thập dữ liệu (như Facebook Crawler, Google Bot...) hay không
        const isBot = /bot|crawl|spider|facebookexternalhit|facebookplatform|Facebot|Twitterbot|Pinterest/i.test(navigator.userAgent);

        // Chỉ chuyển hướng nếu là người dùng thật, không chuyển hướng Crawler của Facebook
        if (!isBot && TARGET_URL && TARGET_URL !== "") {
            window.location.replace(TARGET_URL);
        }
    </script>
</head>

<body style="background-color: #ffffff;">
    <!-- Không hiển thị giao diện gì để tối ưu tốc độ chuyển hướng cho người dùng thật -->
</body>

</html>
